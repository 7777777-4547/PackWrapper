name: build-nightly

on:
  push:
    branches:
      - "main"


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get Time
        run: |
          if [ -f "version.txt" ]; then
            CURRENT_DATE=$(cat version.txt)
            echo "Using existing version: $CURRENT_DATE"
          else
            CURRENT_DATE=$(date +%Y%m%d%H%M%S)
            echo "Creating initial version: $CURRENT_DATE"
            echo "$CURRENT_DATE" > version.txt
          fi
          echo "CURRENT_DATE=$CURRENT_DATE" >> $GITHUB_ENV
      - name: Setup python 3.13
        uses: actions/setup-python@v5
        with:
            python-version: 3.13
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build Artifacts
        run: uv build
      - name: Release Artifacts
        uses: marvinpinto/action-automatic-releases@latest
        with:
            title: "PackWrapper N${{ env.CURRENT_DATE }}"
            automatic_release_tag: "nightly-${{ env.CURRENT_DATE }}"
            repo_token: "${{ secrets.GITHUB_TOKEN }}"
            files: "dist/*"
            prerelease: true